<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contato — Clínica de Psicologia</title>
        <link rel="stylesheet" href="assets/css/servicos.css" />
        <link rel="stylesheet" href="assets/css/sobre-contato.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <link rel="icon" type="image/x-icon" href="assets/images/logo_psicologia.png" />
    </head>
    <body>
         <!-- HEADER -->
    <header>

        <nav class="navbar">

            <!-- LOGO -->
            <div class="logo">

                <img
                    src="assets/images/logo_psicologia.png"
                    alt="Logo da empresa"
                />

                <span>
                    Clínica de Psicologia
                </span>

            </div>

            <!-- LINKS -->
            <ul class="nav-links">

                <li>
                    <a href="index.html">
                        Início
                    </a>
                </li>

                <li id="agendamentoLink" style="display:none;">

                <a href="agendamento.html">
                        Agendamento
                    </a>
                </li>

                <li>
                    <a href="servicos.html">
                        Serviços
                    </a>
                </li>

                <li>
                    <a href="sobre.html">
                        Sobre
                    </a>
                </li>

                <li>
                    <a href="contato.html">
                        Contato
                    </a>
                </li>

            </ul>

            <!-- BOTÕES -->
            <div class="btn">

                <!-- VISITANTE -->
                <div id="guestButtons">

                    <!-- CADASTRO -->
                    <a href="cadastro.html">

                        <button class="cadastro-btn">
                            Cadastrar
                        </button>

                    </a>

                    <!-- LOGIN -->
                    <div class="login-area">

                        <button
                            class="entrar-btn"
                            onclick="toggleMenu()"
                        >
                            Entrar
                        </button>

                        <!-- DROPDOWN LOGIN -->
                        <div
                            id="menuLogin"
                            class="dropdown"
                        >

                            <button
                                onclick="irParaLogin('paciente')"
                            >
                                Paciente
                            </button>

                            <button
                                onclick="irParaLogin('colaborador')"
                            >
                                Colaborador
                            </button>

                        </div>

                    </div>

                </div>

                <!-- PERFIL -->
                <div
                    class="profile-menu"
                    id="profileMenu"
                >

                    <!-- BOTÃO PERFIL -->
                    <button
                        class="profile-btn"
                        id="profileBtn"

                    >

                        <img
                            src="assets/images/user.png"
                            alt="Perfil"
                        />

                    </button>

                    <!-- DROPDOWN PERFIL -->
                    <div
                        class="profile-dropdown"
                        id="profileDropdown"
                    >

                        <!-- NOME -->
                        <p id="userName">
                            Usuário
                        </p>

                        <!-- LINKS -->
                        <a href="perfil.html">
                            Meu Perfil
                        </a>

                        <a href="#">
                            Configurações
                        </a>

                        <!-- TEMA -->
                        <button
                            id="themeToggleDropdown"
                        >
                            🌙 Tema escuro
                        </button>

                        <!-- SAIR -->
                        <button id="logoutBtn">
                            Sair
                        </button>

                    </div>

                </div>

            </div>

        </nav>

    </header>

        <main class="pagina-interna">
            <h1>Contato</h1>
            <p class="contato-intro">
                Quer entrar em contato com a gente? Clique nas seguintes opções — responderemos o mais rápido possível.
            </p>

            <div class="contato-links">
                <!-- Substitua o número: código do país + DDD + número, só dígitos (ex.: 5511999998888) -->
                <a
                    class="contato-card whatsapp"
                    href="https://wa.me/5511999998888"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <span class="icone" aria-hidden="true">💬</span>
                    <span>
                        WhatsApp
                        <small>Envie uma mensagem</small>
                    </span>
                </a>
                <!-- Troque o final da URL pelo seu usuário do Instagram -->
                <a
                    class="contato-card instagram"
                    href="https://www.instagram.com/clinicadepsicologia"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <span class="icone" aria-hidden="true">📸</span>
                    <span>
                        Instagram
                        <small>Siga e mande um direct</small>
                    </span>
                </a>
            </div>
        </main>

        <script src="assets/js/script.js"></script>
    </body>
</html>
