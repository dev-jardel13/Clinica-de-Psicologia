<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contato — Clínica de Psicologia</title>
        <link rel="stylesheet" href="assets/css/servicos.css" />
        <link rel="stylesheet" href="assets/css/sobre-contato.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <link rel="icon" type="image/x-icon" href="assets/images/logo_psicologia.png" />
    </head>
    <body>
        <header>
            <nav class="navbar">
                <div class="logo">
                    <a href="index.html" style="display: flex; align-items: center; text-decoration: none; color: inherit">
                        <img src="assets/images/logo_psicologia.png" alt="Logo da empresa" />
                        <span>Clínica de Psicologia</span>
                    </a>
                </div>
                <ul class="nav-links">
                    <li><a href="index.html">Início</a></li>
                    <li><a href="servicos.html">Serviços</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
                <div class="btn">
                    <a href="cadastro.html">
                        <button class="cadastro-btn" type="button">Cadastrar</button>
                    </a>
                    <div class="login-area">
                        <button class="entrar-btn" type="button" onclick="toggleMenu()">Entrar</button>
                        <div id="menuLogin" class="dropdown">
                            <button type="button" onclick="irParaLogin('paciente')">Paciente</button>
                            <button type="button" onclick="irParaLogin('colaborador')">Colaborador</button>
                        </div>
                    </div>
                    <button id="theme-toggle" type="button">🌙</button>
                </div>
            </nav>
        </header>

        <main class="pagina-interna">
            <h1>Contato</h1>
            <p class="contato-intro">
                Quer entrar em contato com a gente? Clique nas seguintes opções — responderemos o mais rápido possível.
            </p>

            <div class="contato-links">
                <!-- Substitua o número: código do país + DDD + número, só dígitos (ex.: 5511999998888) -->
                <a
                    class="contato-card whatsapp"
                    href="https://wa.me/5511999998888"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <span class="icone" aria-hidden="true">💬</span>
                    <span>
                        WhatsApp
                        <small>Envie uma mensagem</small>
                    </span>
                </a>
                <!-- Troque o final da URL pelo seu usuário do Instagram -->
                <a
                    class="contato-card instagram"
                    href="https://www.instagram.com/clinicadepsicologia"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <span class="icone" aria-hidden="true">📸</span>
                    <span>
                        Instagram
                        <small>Siga e mande um direct</small>
                    </span>
                </a>
            </div>
        </main>

        <script src="assets/js/script.js"></script>
    </body>
</html>
