<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <title>Login de Usuário</title>
</head>
<body>
    <section class="container">


        <div class="login-container">
            <img src="assets/images/logo_psicologia.png" alt="Logo" class="logo">
            <h1>Bem-vindo!</h1>
        <h2>Cada sessão é um passo em direção a você.</h2>


    <form id="formLogin"  method="post">
        
        <div class="input-icon">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" name="email" placeholder="E-mail" required>
        </div>

        <div class="input-icon">
        <i class="fa fa-lock"></i>
        <input type="password" id="senha" name="senha" placeholder="Senha" required>
         </div>

        <a href="#" class="esqueci-senha">Esqueci minha senha</a>
        <button type="submit" id="btnEntrar">Entrar</button>

    </form>
    
    <div class="divisor">
          <span></span>
          <p>ou</p>
          <span></span>
   </div>

    <p>Não tem uma conta? <a href="cadastro.html"><br>Cadastre-se aqui</a></p>

    </div>
    </section>
    <script src="assets/js/script.js"></script>
</body>
</html>
