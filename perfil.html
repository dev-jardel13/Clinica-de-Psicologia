<!doctype html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Editar Perfil</title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="assets/css/perfil.css"
    >

    <!-- FONTE -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet"
    >

</head>

<body>

     <!-- HEADER -->
    <!-- HEADER -->
    <header>

        <nav class="navbar">

            <!-- LOGO -->
            <div class="logo">

                <img
                    src="assets/images/logo_psicologia.png"
                    alt="Logo da empresa"
                />

                <span>
                    Clínica de Psicologia
                </span>

            </div>

            <!-- LINKS -->
            <ul class="nav-links">

                <li>
                    <a href="index.html">
                        Início
                    </a>
                </li>

                <li id="agendamentoLink" style="display:none;">

                <a href="agendamento.html">
                        Agendamento
                    </a>
                </li>

                <li>
                    <a href="servicos.html">
                        Serviços
                    </a>
                </li>

                <li>
                    <a href="sobre.html">
                        Sobre
                    </a>
                </li>

                <li>
                    <a href="contato.html">
                        Contato
                    </a>
                </li>

            </ul>

            <!-- BOTÕES -->
            <div class="btn">

                <!-- VISITANTE -->
                <div id="guestButtons">

                    <!-- CADASTRO -->
                    <a href="cadastro.html">

                        <button class="cadastro-btn">
                            Cadastrar
                        </button>

                    </a>

                    <!-- LOGIN -->
                    <div class="login-area">

                        <button
                            class="entrar-btn"
                            onclick="toggleMenu()"
                        >
                            Entrar
                        </button>

                        <!-- DROPDOWN LOGIN -->
                        <div
                            id="menuLogin"
                            class="dropdown"
                        >

                            <button
                                onclick="irParaLogin('paciente')"
                            >
                                Paciente
                            </button>

                            <button
                                onclick="irParaLogin('colaborador')"
                            >
                                Colaborador
                            </button>

                        </div>

                    </div>

                </div>

                <!-- PERFIL -->
                <div
                    class="profile-menu"
                    id="profileMenu"
                >

                    <!-- BOTÃO PERFIL -->
                    <button
                        class="profile-btn"
                        id="profileBtn"

                    >

                        <img
                            src="assets/images/user.png"
                            alt="Perfil"
                        />

                    </button>

                    <!-- DROPDOWN PERFIL -->
                    <div
                        class="profile-dropdown"
                        id="profileDropdown"
                    >

                        <!-- NOME -->
                        <p id="userName">
                            Usuário
                        </p>

                        <!-- LINKS -->
                        <a href="perfil.html">
                            Meu Perfil
                        </a>

                        <a href="#">
                            Configurações
                        </a>

                        <!-- TEMA -->
                        <button
                            id="themeToggleDropdown"
                        >
                            🌙 Tema escuro
                        </button>

                        <!-- SAIR -->
                        <button id="logoutBtn">
                            Sair
                        </button>

                    </div>

                </div>

            </div>

        </nav>

    </header>

    <!-- CONTAINER -->
    <main class="perfil-container">

        <!-- CARD -->
        <div class="perfil-card">

            <!-- TÍTULO -->
            <h1>
                Editar Perfil
            </h1>

            <p>
                Atualize suas informações
            </p>

            <!-- FORM -->
            <form id="formPerfil">

                <!-- NOME -->
                <div class="input-group">

                    <label for="nome">
                        Nome
                    </label>

                    <input
                        type="text"
                        id="nome"
                        placeholder="Seu nome"
                    >

                </div>

                <!-- EMAIL -->
                <div class="input-group">

                    <label for="email">
                        Email
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Seu email"
                    >

                </div>

                <!-- TELEFONE -->
                <div class="input-group">

                    <label for="telefone">
                        Telefone
                    </label>

                    <input
                        type="text"
                        id="telefone"
                        placeholder="Seu telefone"
                    >

                </div>

                <!-- ENDEREÇO -->
                <div class="input-group">

                    <label for="endereco">
                        Endereço
                    </label>

                    <input
                        type="text"
                        id="endereco"
                        placeholder="Seu endereço"
                    >

                </div>

                <!-- SENHA -->
                <div class="input-group">

                    <label for="senha">
                        Nova senha
                    </label>

                    <input
                        type="password"
                        id="senha"
                        placeholder="Nova senha"
                    >

                </div>

                <!-- BOTÃO -->
                <button
                    type="submit"
                    class="salvar-btn"
                >
                    Salvar alterações
                </button>

            </form>

        </div>

    </main>

    <!-- SCRIPT -->
    <script src="assets/js/script.js"></script>

</body>

</html>
